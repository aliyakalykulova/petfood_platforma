services:
  postgres:
    image: postgres:16-alpine
    container_name: pets_postgres_ctn
    ports:
      - "${PG_HOST_PORT}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - pets_network

  redis:
    image: redis:7.2-alpine
    container_name: pets_redis_ctn
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - pets_network

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: pets_rabbit_ctn
    restart: unless-stopped
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USERNAME}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD}"
    command: >
      sh -c "echo 'loopback_users.guest = false' > /etc/rabbitmq/rabbitmq.conf &&
             rabbitmq-server"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_running" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbit-data:/var/lib/rabbitmq
    networks:
      - pets_network

  recommender-api:
    image: 10.1.14.25:5050/petnutrients/nutrient-recommender:latest
    container_name: recommender_api_ctn
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - pets_network

  auth-service:
    image: 10.1.14.25:5050/petnutrients/backend/auth-service:latest
    container_name: pets_auth_ctn
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis: 
        condition: service_healthy 
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres
      DB_PORT: ${PG_HOST_PORT}
      DB_NAME: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ISSUER: http://auth-service:8082
      JWT_TTL_SECONDS: 300
      JWT_KID_TTL_SECONDS: 3600
    ports:
      - "8082:8082"
    networks:
      - pets_network 

  pets-service:
    image: 10.1.14.25:5050/petnutrients/backend/pets-service:latest
    container_name: pets_pets_ctn
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      minio:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres
      DB_PORT: ${PG_HOST_PORT}
      DB_NAME: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      PETS_MINIO_ENDPOINT: ${PETS_MINIO_ENDPOINT}
      PETS_MINIO_ACCESS_KEY: ${PETS_MINIO_ACCESS_KEY}
      PETS_MINIO_SECRET_KEY: ${PETS_MINIO_SECRET_KEY}
      PETS_MINIO_BUCKET: ${PETS_MINIO_BUCKET}
      PETS_MINIO_UPLOAD_TTL_SECONDS: ${PETS_MINIO_UPLOAD_TTL_SECONDS}
      PETS_MINIO_DOWNLOAD_TTL_SECONDS: ${PETS_MINIO_DOWNLOAD_TTL_SECONDS}

      ACCOUNT_SERVICE_URL: ${ACCOUNT_SERVICE_URL}
      JWK_SET_URI: http://auth-service:8082/.well-known/jwks.json
    ports:
      - "8083:8083"
    networks:
      - pets_network

  account-service:
    image: 10.1.14.25:5050/petnutrients/backend/account-service:latest
    container_name: pets_account_ctn
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres
      DB_PORT: ${PG_HOST_PORT}
      DB_NAME: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWK_SET_URI: http://auth-service:8082/.well-known/jwks.json
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    ports:
      - "8081:8081"
    networks:
      - pets_network

  notifications-service:
    image: 10.1.14.25:5050/petnutrients/backend/notifications-service:latest
    container_name: pets_notifications_ctn
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      SMTP_GMAIL_USER: ${SMTP_GMAIL_USER}
      SMTP_GMAIL_PASS: ${SMTP_GMAIL_PASS}
      SMTP_GMAIL_FROM: ${SMTP_GMAIL_FROM}
    ports:
      - "8084:8084"
    networks:
      - pets_network

  gateway-service:
    image: 10.1.14.25:5050/petnutrients/backend/gateway-service:latest 
    container_name: pets_gateway_ctn
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_started
      account-service:
        condition: service_started
      pets-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8090
      AUTH_BASE_URL: http://auth-service:8082
      AUTH_EXCHANGE_PATH: /api/v1/auth/sid/exchange
      ACCOUNT_SERVICE_URL: http://account-service:8081
      PETS_SERVICE_URL: http://pets-service:8083
      AUTH_SERVICE_URL: http://auth-service:8082
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8090:8090"
    networks:
      - pets_network

  frontend:
    image: 10.1.14.25:5050/petnutrients/frontend:latest 
    container_name: pets_frontend_ctn
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs
      - ./minio/certs:/etc/minio/certs  
    networks:
      - pets_network
       
  minio:
    image: minio/minio:latest
    command: server --console-address ":9001" /data/
    container_name: pets_minio_ctn
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_SERVER_URL: "https://85.159.27.240:9000"
      MINIO_BROWSER_REDIRECT_URL: "https://85.159.27.240:9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
      - ./minio/certs:/root/.minio/certs
    networks:
      - pets_network

networks:
  pets_network:
    driver: bridge

volumes:
  pg-data:
  redis-data:
  rabbit-data:
  minio-data:
