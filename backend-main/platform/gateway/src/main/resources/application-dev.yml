spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      password:

  cloud:
    gateway:
      default-filters:
        - name: DedupeResponseHeader
          args:
            name: Access-Control-Allow-Origin, Access-Control-Allow-Credentials
            strategy: RETAIN_FIRST

      routes:
        # --- Account Service ---
        - id: account
          uri: ${ACCOUNT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/account/**

        # --- Pets Service ---
        - id: pets
          uri: ${PETS_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/pets/**

        # --- Auth JWKs ---
        - id: auth-jwks
          uri: ${AUTH_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/.well-known/jwks.json

      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - "*"
            allowCredentials: true
